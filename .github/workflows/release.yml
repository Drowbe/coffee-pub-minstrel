name: Release Creation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Get version from tag or manual input
      - name: Get Version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi
      
      # Create zip file (includes only what exists; excludes dev/docs and tooling)
      - name: Create Zip File
        run: |
          zip -r coffee-pub-minstrel.zip . \
            -x ".git/*" \
            -x "*.git*" \
            -x ".github/*" \
            -x "*node_modules/*" \
            -x "*.vscode/*" \
            -x "*.code-workspace" \
            -x "documentation/*" \
            -x "*.lock" \
            -x ".cursor/*"

      # Create release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            coffee-pub-minstrel.zip
            module.json
          draft: false
          prerelease: false
          name: Release ${{ steps.get-version.outputs.version }}
          body: |
            Release version ${{ steps.get-version.outputs.version }}

            ## What's Changed
            * ${{ github.event_name == 'workflow_dispatch' && 'Released via workflow_dispatch.' || format('Automated release from pushed tag {0}.', github.ref_name) }}

            For full changes, see the [changelog](CHANGELOG.md).
